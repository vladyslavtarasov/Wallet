<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <div class="form-wrapper">
        <div class="log-btns">
          <button id="log" class="btn btn-log">login</button>
          <button id="reg" class="btn btn-reg unactive">register</button>
        </div>
        <form class="register-form" id="regform">
          <input type="text" id="name" placeholder="Name" />
          <input type="text" id="surname" placeholder="Surname" />
          <input type="text" id="user_name" placeholder="Username" />
          <input type="password" id="password" placeholder="Password" />
          <input type="submit" value="Register" id="submit" />
        </form>
        <form class="login-form unactive" id="logform">
          <input type="text" id="user_name_login" placeholder="Username" />
          <input type="password" id="password_login" placeholder="Password" />
          <input type="submit" value="Login" id="submit_login" />
        </form>
      </div>
    </div>

    <div class="accounts-wrapper hidden">
      <div class="account-list"></div>
      <button class="add">Create account</button>
    </div>
  
  <div class="modal">
    <span class="close">x</span>
    <form class="create-account-form">
      <!--<input type="text" id="user_name_create_account" placeholder="Username"/>-->
      <input type="text" id="account_name_create_account" placeholder="Account name"/>
      <input type="number" id="balance_create_account" placeholder="Account balance"/>
      <input type="submit" value="Create" id="submit_create_account"/>
    </form>
  </div>
  
  </body>
  <script src="https://code.jquery.com/jquery-3.6.3.min.js" integrity="sha256-pvPw+upLPUjgMXY0G+8O0xUf+/Im1MZjXxxgOcBQBXU=" crossorigin="anonymous"></script>
  <script src="./js/script.js"></script>
  <!--<script src="./js/accountMenuScript.js"></script>-->
</html>
